# ============================================================================
# AI tools declaration (transparency only — not penalized)
# ============================================================================
ai_tools_used:
  - "Claude"        # architecture, code review, pair-programming via Claude Code

ai_usage_summary: |
  Used Claude (Claude Code) for architecture discussion, implementation, and code
  review across the whole build. All design decisions, data exploration, scoring
  weights, and trap-handling were driven by analysis of the actual candidate pool.
  No candidate data was sent to any hosted LLM, and the ranking step makes no
  network/API calls (CPU-only, offline).

# ============================================================================
# Approach summary (<=200 words)
# ============================================================================
methodology_summary: |
  Two-phase hybrid ranker. OFFLINE precompute: embed all 100k candidate documents
  (headline + summary + career descriptions) with bge-small (CPU), and build
  graph-assisted features with networkx + FAISS. ONLINE ranking (<15s, CPU, no
  network): for each candidate, relevance = 0.55*semantic-similarity-to-JD +
  0.45*structured-proxy (title + career-evidence + corroborated-skill-trust).
  This is multiplied by experience-fit, location-fit, and a bounded graph_boost
  (kNN peer-quality + skill co-occurrence coherence + company product-ness), then
  by behavioural availability (recency, recruiter response, open-to-work, notice)
  and JD disqualifier penalties (consulting-only, CV/speech-without-NLP,
  LangChain-only, title-chaser). Logically-impossible profiles (honeypots) are
  hard-demoted. The design deliberately reads BEYOND keywords: keyword-stuffers
  (off-role titles with stuffed AI skills) and honeypots are pushed out, while
  plain-language fits (built ranking/recsys at product companies) surface via
  semantic similarity and career evidence. Reasoning is deterministic and
  fact-grounded (no runtime LLM).

declarations:
  read_submission_spec: true
